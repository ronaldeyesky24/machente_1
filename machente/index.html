<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Machente Distrito - Promoción Final</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        :root {
            --primary: #c9a050; /* Gold */
            --secondary: #1b4d3e; /* Forest Green */
            --text: #ffffff;
            --bg: #0a0a0a;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Montserrat', sans-serif;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #video-container {
            width: 100vw;
            height: 100vh;
            position: relative;
            background: #000;
            overflow: hidden;
        }

        .scene {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            visibility: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1;
        }

        .bg-image, .bg-video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: brightness(0.6) contrast(1.1);
            z-index: 0; /* Behind overlays and captions */
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, transparent 20%, rgba(0,0,0,0.4) 100%),
                        linear-gradient(to bottom, rgba(0,0,0,0.5) 0%, transparent 30%, transparent 70%, rgba(0,0,0,0.9) 100%);
            z-index: 2;
        }

        .cover {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 10, 10, 0.9);
            z-index: 10;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 5vw;
            opacity: 0;
            visibility: hidden;
            backdrop-filter: blur(10px);
        }

        .cover-title {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2.5rem, 8vw, 4.5rem);
            color: var(--primary);
            margin-bottom: 2vh;
            line-height: 1.1;
            text-transform: uppercase;
        }

        .cover-subtitle {
            font-size: clamp(0.8rem, 2vw, 1.2rem);
            text-transform: uppercase;
            letter-spacing: 0.5em;
            color: var(--text);
            opacity: 0.8;
            margin-bottom: 2vh;
        }

        .caption-container {
            position: absolute;
            bottom: 15%;
            width: 100%;
            text-align: center;
            z-index: 5;
            padding: 0 10vw;
            opacity: 0;
        }

        .caption {
            font-family: 'Playfair Display', serif;
            font-size: clamp(1.8rem, 5vw, 3rem);
            text-shadow: 0 4px 20px rgba(0,0,0,1);
            line-height: 1.2;
            color: #fff;
        }

        #start-screen {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: 100;
            background: #000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            text-align: center;
            padding: 50px;
        }

        #start-button {
            padding: 20px 50px;
            border: 3px solid var(--primary);
            color: var(--primary);
            background: transparent;
            font-size: 1.5rem;
            text-transform: uppercase;
            letter-spacing: 5px;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            margin-top: 50px;
            position: relative;
            overflow: hidden;
        }

        #start-button:hover {
            background: var(--primary);
            color: #000;
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(201, 160, 80, 0.4);
        }

        .vignette {
            position: absolute;
            width: 100%;
            height: 100%;
            box-shadow: inset 0 0 25vw rgba(0,0,0,0.95);
            z-index: 3;
            pointer-events: none;
        }

        #progress {
            position: absolute;
            top: 0;
            left: 0;
            height: 6px;
            background: var(--primary);
            width: 0%;
            z-index: 110;
        }

        @media (orientation: landscape) {
            .caption-container {
                bottom: 10%;
            }
        }
    </style>
</head>
<body>

<div id="video-container">
    <div id="progress"></div>

    <div id="start-screen">
        <h1 style="color: var(--primary); font-family: 'Playfair Display'; font-size: clamp(2rem, 10vw, 5rem);">MACHENTE</h1>
        <p style="margin-top: 20px; letter-spacing: 8px; text-transform: uppercase; font-size: clamp(0.7rem, 2vw, 1.2rem);">El Corazón del VRAEM</p>
        <button id="start-button">Comenzar</button>
    </div>

    <div id="scenes-wrapper"></div>
    <div class="vignette"></div>
</div>

<audio id="bg-music" loop>
    <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
</audio>

<script>
    const scenesData = [
        { id: 'intro', type: 'image', src: 'PUEBLO MACHENTE/WhatsApp Image 2026-04-13 at 6.33.31 PM (1).jpeg', title: 'Bienvenidos', subtitle: 'Santa Cruz de Machente', caption: 'Donde la selva se une con la historia', duration: 10 },
        { id: 'edu-vid', type: 'video', src: 'IE%20BELAUNDE%20TERRY/video_belaunde.MP4', title: 'Colegio Emblemático', subtitle: 'IE Belaunde Terry', caption: 'Liderazgo y Excelencia Educativa', duration: 25 },
        { id: 'salud', type: 'image', src: 'CENTRO DE SALUD/CENTRO DE SALUD MACHENTE.jpeg', title: 'Salud Integral', subtitle: 'Compromiso Vital', caption: 'Atención de calidad para todos', duration: 10 },
        { id: 'seguridad', type: 'image', src: 'CONTROL POLICIAL/WhatsApp Image 2026-04-13 at 6.33.28 PM (1).jpeg', title: 'Seguridad', subtitle: 'Distrito Protegido', caption: 'Paz y orden en nuestras calles', duration: 10 },
        { id: 'infra', type: 'image', src: 'CARRETERA CENTRAL/VIA PRINCIPAL.jpeg', title: 'Conectividad', subtitle: 'Vías de Desarrollo', caption: 'Machente conectado con el Perú', duration: 10 },
        { id: 'industria', type: 'image', src: 'INDUSTRIALIZACIÓN/TRATAMIENTO DE PALILLO.jpeg', title: 'Economía Viva', subtitle: 'Industrialización', caption: 'Motor productivo del VRAEM', duration: 10 },
        { id: 'naturaleza', type: 'image', src: 'PAISAJES/WhatsApp Image 2026-04-13 at 6.33.33 PM.jpeg', title: 'Paraíso Verde', subtitle: 'Ecosistema Puro', caption: 'Naturaleza en su máximo esplendor', duration: 10 },
        { id: 'agua', type: 'image', src: 'TANQUES DE TRATAMIENTO DE AGUAS/WhatsApp Image 2026-04-13 at 6.33.32 PM.jpeg', title: 'Servicios', subtitle: 'Saneamiento Real', caption: 'Agua potable y vida digna', duration: 10 },
        { id: 'final', type: 'image', src: 'PUEBLO MACHENTE/WhatsApp Image 2026-04-13 at 6.33.31 PM (1).jpeg', title: '¡Machente Distrito!', subtitle: 'Un Futuro Imparable', caption: 'Únete a la Gran Transformación', duration: 15 }
    ];

    const wrapper = document.getElementById('scenes-wrapper');
    const startBtn = document.getElementById('start-button');
    const startScreen = document.getElementById('start-screen');
    const bgMusic = document.getElementById('bg-music');
    const progressBar = document.getElementById('progress');

    scenesData.forEach(scene => {
        const sceneDiv = document.createElement('div');
        sceneDiv.className = 'scene';
        sceneDiv.id = scene.id;

        const coverDiv = document.createElement('div');
        coverDiv.className = 'cover';
        coverDiv.innerHTML = `<div class="cover-subtitle">${scene.subtitle}</div><div class="cover-title">${scene.title}</div>`;

        let bgContent = scene.type === 'video' 
            ? `<video class="bg-video" muted playsinline loop preload="auto"><source src="${scene.src}" type="video/mp4"></video>`
            : `<img class="bg-image" src="${scene.src}" alt="${scene.title}">`;

        sceneDiv.innerHTML = `${bgContent}<div class="overlay"></div><div class="caption-container"><div class="caption">${scene.caption}</div></div>`;
        sceneDiv.appendChild(coverDiv);
        wrapper.appendChild(sceneDiv);
    });

    startBtn.addEventListener('click', () => {
        gsap.to(startScreen, { opacity: 0, scale: 1.2, duration: 1.5, ease: 'power4.inOut', onComplete: () => {
            startScreen.style.display = 'none';
            playHybridVideo();
        }});
        bgMusic.play();
    });

    function playHybridVideo() {
        const timeline = gsap.timeline();
        let currentTime = 0;

        scenesData.forEach((scene, index) => {
            const sceneEl = document.querySelector(`#${scene.id}`);
            const coverEl = sceneEl.querySelector('.cover');
            const bgEl = sceneEl.querySelector(scene.type === 'video' ? 'video' : '.bg-image');
            const captionEl = sceneEl.querySelector('.caption-container');

            timeline.set(sceneEl, { autoAlpha: 1, visibility: 'visible' }, currentTime);
            timeline.fromTo(coverEl, { autoAlpha: 0, scale: 1.1 }, { autoAlpha: 1, scale: 1, duration: 1.5, ease: 'power2.out' }, currentTime);
            
            if (scene.type === 'video') {
                timeline.add(() => {
                    bgEl.load(); // Ensure buffering starts if not already
                    bgEl.currentTime = 0;
                    bgEl.play();
                }, currentTime);
            }

            const revealTime = currentTime + 3.5; 
            timeline.to(coverEl, { autoAlpha: 0, filter: 'blur(10px)', duration: 1.5, ease: 'power2.inOut' }, revealTime);
            timeline.fromTo(bgEl, { scale: 1.3 }, { scale: 1, duration: scene.duration, ease: 'none' }, currentTime);
            timeline.fromTo(captionEl, { opacity: 0, y: 50 }, { opacity: 1, y: 0, duration: 2, ease: 'back.out(1.7)' }, revealTime + 0.5);

            if (index < scenesData.length - 1) {
                timeline.to(sceneEl, { autoAlpha: 0, scale: 1.1, duration: 2, ease: 'power2.inOut' }, currentTime + scene.duration - 1);
            }
            
            currentTime += scene.duration - 0.5;
        });

        timeline.to(progressBar, { width: '100%', duration: currentTime, ease: 'none' }, 0);
    }
</script>
</body>
</html>
